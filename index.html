<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Matador Capital Advisors</title>
  <meta name="description" content="Matador Capital Advisors" />
  <style>
    :root {
      --bg-top: #121212;
      --bg-bottom: #050505;
      --text: #f1f1f1;
      --soft: #d9d9d9;
      --muted: #8d939c;
      --muted-2: #6f7680;
      --link: #d9d9d9;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .wrap {
      width: min(92vw, 760px);
      text-align: center;
      animation: fadeUp 700ms ease-out both;
    }

    .logo {
      width: min(100%, 470px);
      height: auto;
      display: block;
      margin: 0 auto 22px;
      opacity: 0.96;
    }

    .tagline {
      margin: 0 0 18px;
      font-size: 12px;
      line-height: 1.7;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .email {
      display: inline-block;
      color: var(--link);
      text-decoration: none;
      font-size: 17px;
      line-height: 1.6;
      letter-spacing: 0.02em;
    }

    .email:hover {
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .location {
      margin-top: 10px;
      font-size: 12px;
      line-height: 1.6;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted-2);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 520px) {
      .logo {
        width: min(100%, 380px);
        margin-bottom: 18px;
      }

      .tagline {
        font-size: 11px;
        letter-spacing: 0.14em;
        margin-bottom: 14px;
      }

      .email {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <img class="logo" src="matador-stacked-logo.png" alt="Matador Capital Advisors" />

    <p class="tagline">Commercial Real Estate Capital Advisory</p>

    <a class="email" href="mailto:info@matador1.com">info@matador1.com</a>

    <div class="location">Dallas, TX</div>
  </main>
</body>
</html>
