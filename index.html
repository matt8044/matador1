<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Matador Capital Advisors</title>
  <meta name="description" content="Matador Capital Advisors" />
  <link rel="icon" href="favicon.ico" />

  <style>
    :root {
      --bg-top: #121212;
      --bg-bottom: #050505;
      --text: #f0f0f0;
      --muted: #9aa1ab;
      --muted-2: #6f7680;
      --link: #d9d9d9;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(900px 380px at 50% 18%, rgba(255,255,255,0.035), transparent 62%),
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .wrap {
      width: min(92vw, 760px);
      text-align: center;
      animation: fadeUp 700ms ease-out both;
    }

    /* Logo */
    .logo {
      width: min(100%, 440px);
      height: auto;
      display: block;
      margin: 0 auto 24px;

      /* soften the white in the logo slightly */
      opacity: 0.93;
      filter: brightness(0.90) contrast(0.97);
    }

    /* Tagline */
    .tagline {
      margin: 0 0 16px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* Email */
    .email {
      display: inline-block;
      color: var(--link);
      text-decoration: none;
      font-size: 18px;
      font-weight: 500;
      letter-spacing: 0.02em;
      margin-bottom: 8px;
    }

    .email:hover {
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    /* Location */
    .location {
      margin-top: 0;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted-2);
    }

    /* subtle fade animation */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* mobile adjustments */
    @media (max-width: 520px) {
      .logo {
        width: min(100%, 360px);
        margin-bottom: 22px;
      }

      .tagline {
        font-size: 13px;
        letter-spacing: 0.14em;
      }

      .email {
        font-size: 17px;
      }
    }
  </style>
</head>

<body>

  <main class="wrap">

    <img class="logo" src="matador-stacked-logo.png" alt="Matador Capital Advisors" />

    <p class="tagline">Commercial Real Estate Capital Advisory</p>

    <a class="email" href="mailto:info@matador1.com">info@matador1.com</a>

    <div class="location">Dallas, TX</div>

  </main>

</body>
</html>
