<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Matador Capital Advisors</title>
  <meta name="description" content="Matador Capital Advisors" />
  <link rel="icon" href="favicon.ico" />

  <style>
    :root {
      --bg-top: #111111;
      --bg-bottom: #040404;
      --text: #f0f0f0;
      --muted: #a1a8b1;
      --muted-2: #727983;
      --link: #dddddd;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(700px 260px at 50% 34%, rgba(255,255,255,0.05), transparent 60%),
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .wrap {
      width: min(92vw, 760px);
      text-align: center;
      animation: fadeUp 700ms ease-out both;
    }

    .logo {
      width: min(100%, 420px);
      height: auto;
      display: block;
      margin: 0 auto 22px;
      opacity: 0.92;
      filter: brightness(0.90) contrast(0.97);
    }

    .tagline {
      margin: 0 0 14px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .email {
      display: inline-block;
      margin: 0 0 8px;
      color: var(--link);
      text-decoration: none;
      font-size: 18px;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .email:hover {
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .location {
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted-2);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 520px) {
      .logo {
        width: min(100%, 360px);
        margin-bottom: 20px;
      }

      .tagline {
        font-size: 13px;
        letter-spacing: 0.13em;
      }

      .email {
        font-size: 17px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <img class="logo" src="matador-stacked-logo.png" alt="Matador Capital Advisors" />

    <p class="tagline">Commercial Real Estate Capital Advisory</p>

    <a class="email" href="mailto:info@matador1.com">info@matador1.com</a>

    <div class="location">Dallas, TX</div>
  </main>
</body>
</html>
